enableImmutableInstalls: false

nodeLinker: node-modules

npmRegistryServer: "https://artifacts.procoretech.com/artifactory/api/npm/npm"

npmScopes:
  procore:
    npmPublishRegistry: "https://registry.npmjs.org"
    npmRegistryServer: "https://artifacts.procoretech.com/artifactory/api/npm/npm"

# Relax stale peer ranges so React 18 / styled-components 6 match Procore app stacks (Yarn YN0060).
packageExtensions:
  "@procore/labs-file-select@*":
    peerDependencies:
      styled-components: ">=5.1.1 <7"
  "@procore/labs-i18n-extensions@*":
    peerDependencies:
      react: ">=18.0.0 <19"
      react-dom: ">=18.0.0 <19"
  "@procore/json-formulator-extensions@*":
    peerDependencies:
      "@procore/json-formulator": ">=9.2.0 <10"
